<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Log - Obsidian Premium Dark Glassmorphism</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            /* Obsidian Dark Theme Core Color Tokens */
            --base-00: #1e1e1e; /* Canvas Background */
            --base-05: #212121; /* Primary Surface */
            --base-10: #242424; /* Elevated Card Base */
            --base-20: #262626; /* Deep Component Background */
            --base-25: #2a2a2a; /* Subtle Borders & Sub-dividers */
            --base-30: #363636; /* High Contrast Borders */
            --base-35: #3f3f3f; /* Control Boundaries */
            --base-40: #555555; /* Disabled Content Elements */
            --base-50: #666666; /* Muted Meta Data Titles */
            --base-60: #999999; /* Secondary Body Elements */
            --base-70: #bababa; /* High Contrast Base Text */
            --base-100: #dadada; /* Near-White Accent Indicators */

            /* Functional Obsidian Purple Palette Accents */
            --color-purple: #a374f9;
            --color-purple-rgb: 163, 116, 249;
            --mono-rgb-100: 255, 255, 255;
            --mono-rgb-0: 0, 0, 0;

            /* Typeface Layout Scales */
            --font-interface-theme: 'Inter', system-ui, -apple-system, sans-serif;
            --font-monospace-theme: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-interface-theme);
            background-color: var(--base-00);
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-panel {
            background: rgba(30, 30, 30, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid var(--base-25);
            border-right: 1px solid var(--base-25);
            box-shadow: 0 20px 50px -12px rgba(var(--mono-rgb-0), 0.6);
        }
        
        .inner-card {
            background: rgba(var(--mono-rgb-100), 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--base-25);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center select-none antialiased p-4 overflow-x-hidden" style="color: var(--base-70);">

    <main class="w-full max-w-md flex flex-col gap-5 mt-2 relative">
        
        <!-- Ambient Decorative Blurs derived from Purple Theme Palettes -->
        <div class="absolute -top-12 -right-12 w-32 h-32 rounded-full blur-2xl pointer-events-none" style="background-color: rgba(var(--color-purple-rgb), 0.08);"></div>
        <div class="absolute -bottom-12 -left-12 w-32 h-32 rounded-full blur-2xl opacity-30 pointer-events-none" style="background-color: var(--base-30);"></div>

        <div class="flex flex-col gap-5 w-full z-10">
            <div class="w-full flex justify-between items-start pt-2">
                <div class="flex flex-col">
                    <h1 class="text-2xl font-bold text-white tracking-tight">Daily Log</h1>
                </div>
            </div>

            <!-- Total Hours Tracking Header Container Component -->
            <div class="w-full inner-card rounded-2xl p-5 flex flex-col items-center justify-center gap-2 shadow-xs relative overflow-hidden group">
                <div class="w-9 h-9 rounded-full flex items-center justify-center shadow-inner" 
                     style="background-color: var(--base-05); border: 1px solid var(--base-30); color: var(--color-purple);">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                </div>
                <span class="text-[11px] font-bold uppercase tracking-wider" style="color: var(--base-50);">Total Hours</span>
                <div class="text-4xl font-bold text-white tracking-tight transition-transform duration-300 group-hover:scale-102" style="font-family: var(--font-monospace-theme);">00:00</div>
            </div>

            <!-- Analytical Grid / Data Chart Panel Container -->
            <div class="w-full inner-card rounded-2xl p-4 flex flex-col gap-3 shadow-xs">
                <div class="flex justify-between items-center mb-0.5">
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full" style="background-color: var(--color-purple);"></span>
                        <h2 class="text-xs font-bold" style="color: var(--base-100);">Hourly Activity</h2>
                    </div>
                    <span class="text-[9px] font-medium px-1.5 py-0.5 rounded-sm flex items-center gap-1" 
                          style="color: var(--base-60); background-color: var(--base-10); border: 1px solid var(--base-25);">
                        Swipe View <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-2.5 h-2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25 21 12m0 0-3.75 3.75M21 12H3" /></svg>
                    </span>
                </div>
                
                <div class="w-full overflow-x-auto no-scrollbar touch-pan-x" id="chartWrapper">
                    <div class="w-[720px] h-40 relative">
                        <canvas id="hourlyActivityChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Macro System Status Information Summary Segment Row -->
            <section class="grid grid-cols-3 gap-3 w-full">
                <div class="inner-card rounded-xl p-3 flex flex-col gap-0.5 items-center justify-center text-center">
                    <span class="text-[9px] font-bold uppercase tracking-widest" style="color: var(--base-50);">Total Sessions</span>
                    <span class="text-lg font-black text-white mt-0.5">4</span>
                </div>
                <div class="inner-card rounded-xl p-3 flex flex-col gap-0.5 items-center justify-center text-center">
                    <span class="text-[9px] font-bold uppercase tracking-widest" style="color: var(--color-purple);">Active</span>
                    <span class="text-lg font-black mt-0.5" style="color: var(--color-purple);">1</span>
                </div>
                <div class="inner-card rounded-xl p-3 flex flex-col gap-0.5 items-center justify-center text-center">
                    <span class="text-[9px] font-bold uppercase tracking-widest" style="color: var(--base-50);">Completed</span>
                    <span class="text-lg font-black mt-0.5" style="color: var(--base-70);">3</span>
                </div>
            </section>
        </div>

        <!-- Metric Component Interface List Grid Wrapper -->
        <div class="w-full inner-card rounded-2xl p-5 flex flex-col gap-4 shadow-xs z-10 mb-2">
            <div class="flex justify-between items-center pb-2.5" style="border-bottom: 1px solid var(--base-25);">
                <h3 class="text-xs font-bold" style="color: var(--base-100);">Sessions</h3>
                <span class="text-[10px] font-bold px-2.5 py-0.5 rounded-full flex items-center gap-1.5" 
                      style="color: var(--base-60); background-color: var(--base-20); border: 1px solid var(--base-30);">
                    <span class="w-1.5 h-1.5 rounded-full" style="background-color: var(--base-50);"></span> Completed
                </span>
            </div>

            <div class="flex flex-col gap-3 text-xs">
                <div class="flex justify-between items-center py-0.5">
                    <span class="font-medium" style="color: var(--base-50);">Check In:</span>
                    <span class="font-semibold" style="color: var(--base-100);">11:41 AM</span>
                </div>
                <div class="flex justify-between items-center py-0.5">
                    <span class="font-medium" style="color: var(--base-50);">Check Out:</span>
                    <span class="font-semibold" style="color: var(--base-100);">11:51</span>
                </div>
                <div class="flex justify-between items-center pt-2.5" style="border-top: 1px dashed var(--base-25);">
                    <span class="font-bold" style="color: var(--base-60);">Duration:</span>
                    <span class="font-bold px-2.5 py-1 rounded text-sm" 
                          style="font-family: var(--font-monospace-theme); color: var(--color-purple); background-color: rgba(var(--color-purple-rgb), 0.12); border: 1px solid rgba(var(--color-purple-rgb), 0.15);">
                        01:00:00
                    </span>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const ctx = document.getElementById('hourlyActivityChart').getContext('2d');
            
            // Obsidian Purple Linear Accent Configuration 
            const gradient = ctx.createLinearGradient(0, 0, 0, 140);
            gradient.addColorStop(0, 'rgba(163, 116, 249, 0.85)');
            gradient.addColorStop(1, 'rgba(163, 116, 249, 0.01)');

            const full24HoursLabels = [
                '12 AM', '1 AM', '2 AM', '3 AM', '4 AM', '5 AM', '6 AM', '7 AM', '8 AM', '9 AM', '10 AM', '11 AM',
                '12 PM', '1 PM', '2 PM', '3 PM', '4 PM', '5 PM', '6 PM', '7 PM', '8 PM', '9 PM', '10 PM', '11 PM'
            ];
            
            const activityData = [0, 0, 0, 0, 0, 0, 0, 0, 1, 3, 2, 4, 1, 0, 2, 3, 1, 0, 0, 0, 0, 0, 0, 0];

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: full24HoursLabels,
                    datasets: [{
                        data: activityData,
                        backgroundColor: gradient,
                        borderColor: '#a374f9',
                        borderWidth: 1.5,
                        borderRadius: 4,
                        borderSkipped: false,
                        barPercentage: 0.55
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#212121',
                            titleFont: { size: 10, weight: 'bold', family: 'Inter' },
                            bodyFont: { size: 10, family: 'Inter' },
                            padding: 10,
                            cornerRadius: 8,
                            displayColors: false,
                            borderColor: '#2a2a2a',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return ` Sessions: ${context.raw}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { 
                                font: { size: 9, weight: '600', family: 'Inter' }, 
                                color: '#666666' 
                            }
                        },
                        y: {
                            min: 0,
                            max: 5,
                            grid: { color: 'rgba(255, 255, 255, 0.02)' },
                            ticks: { 
                                stepSize: 1,
                                font: { size: 9, family: 'Inter' }, 
                                color: '#666666' 
                            }
                        }
                    }
                }
            });

            // Smooth Horizontal Chart Anchor Shift to Mid-Day Metrics
            const wrapper = document.getElementById('chartWrapper');
            setTimeout(() => {
                wrapper.scrollLeft = 190;
            }, 300);
        });
    </script>
</body>
</html>
